services:
  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    depends_on:
      - redis
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  redis_data:
